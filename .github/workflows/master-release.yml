name: Master Latest Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: master-latest-release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies (Source)
        run: dotnet restore ./Source/EasyMode.csproj

      - name: Build project (Source)
        run: dotnet build ./Source/EasyMode.csproj --configuration Release --no-restore

      - name: Build release metadata
        id: meta
        run: |
          set -euo pipefail
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"

      - name: Package full mod structure
        id: pack
        run: |
          set -euo pipefail

          ARTIFACT_ROOT="$RUNNER_TEMP/release-package"
          RELEASE_DIR="$ARTIFACT_ROOT/easyrim"
          ZIP_PATH="$ARTIFACT_ROOT/easyrim-latest-master.zip"

          rm -rf "$ARTIFACT_ROOT"
          mkdir -p "$RELEASE_DIR"

          for dir in About Assemblies Defs Languages Patches Textures Sounds; do
            if [ -d "$dir" ]; then
              cp -a "$dir" "$RELEASE_DIR/"
            fi
          done

          mkdir -p "$RELEASE_DIR/Assemblies"
          cp -f ./Source/bin/Release/net472/*.dll "$RELEASE_DIR/Assemblies/"

          for file in LoadFolders.xml loadfolders.xml; do
            if [ -f "$file" ]; then
              cp -f "$file" "$RELEASE_DIR/"
            fi
          done

          (
            cd "$ARTIFACT_ROOT"
            zip -r "$ZIP_PATH" easyrim
          )

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Create or update latest-master release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-master
          commit: ${{ github.sha }}
          name: Latest Master Build (${{ steps.meta.outputs.short_sha }})
          body: |
            Auto-updated from master.

            - Commit: ${{ github.sha }}
            - Built at: ${{ steps.meta.outputs.build_time }}
            - Artifact: easyrim-latest-master.zip
          artifact: ${{ steps.pack.outputs.zip_path }}
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          prerelease: true

name: Release to Steam Workshop

on:
  # 推荐的发布触发方式：push tag（如 v1.0.0）
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          # Source/EasyMode.csproj 是 SDK 风格 net472 项目，可由 dotnet+MSBuild 构建。
          # 这里固定 8.0.x 并与仓库既有构建流程保持一致，降低 CI 环境漂移风险。
          dotnet-version: 8.0.x

      - name: Restore dependencies (Source)
        run: dotnet restore ./Source/EasyMode.csproj

      - name: Build project (Source)
        run: dotnet build ./Source/EasyMode.csproj --configuration Release --no-restore

      - name: Package full mod structure for release
        run: |
          set -euo pipefail

          RELEASE_DIR="$RUNNER_TEMP/release-package/easyrim"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          # 复制完整模组结构（About / Assemblies / Defs 等）
          for dir in About Assemblies Defs Languages Patches Textures Sounds; do
            if [ -d "$dir" ]; then
              cp -a "$dir" "$RELEASE_DIR/"
            fi
          done

          # 覆盖发布包内 DLL 为当前构建结果
          mkdir -p "$RELEASE_DIR/Assemblies"
          cp -f ./Source/bin/Release/net472/*.dll "$RELEASE_DIR/Assemblies/"

          # 可选根文件
          for file in LoadFolders.xml loadfolders.xml; do
            if [ -f "$file" ]; then
              cp -f "$file" "$RELEASE_DIR/"
            fi
          done

      - name: Extract Workshop ID from project files
        id: workshop_id
        # 先从 About/About.xml 提取，若未配置则回退到 easyrim.vdf
        run: |
          set -euo pipefail

          WORKSHOP_ID="$(python3 - <<'PY'
          import os
          import re
          import xml.etree.ElementTree as ET

          workshop_id = ""

          # 1) 优先从 About/About.xml 提取（推荐）
          about_file = "About/About.xml"
          if os.path.exists(about_file):
              root = ET.parse(about_file).getroot()
              for tag in ("steamWorkshopId", "publishedFileId", "workshopId"):
                  node = root.find(tag)
                  if node is not None and node.text and node.text.strip():
                      workshop_id = node.text.strip()
                      break

          # 2) 兜底：从 VDF 提取 publishedfileid
          if not workshop_id and os.path.exists("easyrim.vdf"):
              with open("easyrim.vdf", "r", encoding="utf-8") as f:
                  data = f.read()
              m = re.search(r'"publishedfileid"\s*"?(\d+)"?', data)
              if m:
                  workshop_id = m.group(1)

          print(workshop_id)
          PY
          )"

          if [ -z "$WORKSHOP_ID" ]; then
            echo "::error::Workshop ID not found. Put <steamWorkshopId>YOUR_ID</steamWorkshopId> in About/About.xml or set publishedfileid in easyrim.vdf."
            exit 1
          fi

          if ! [[ "$WORKSHOP_ID" =~ ^[0-9]+$ ]]; then
            echo "::error::Workshop ID is not numeric: $WORKSHOP_ID"
            exit 1
          fi

          echo "workshop_id=$WORKSHOP_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved Workshop ID: $WORKSHOP_ID"

      - name: Upload to Steam Workshop
        uses: weilbyte/steam-workshop-upload@v1
        with:
          # RimWorld 固定 AppID
          appid: 294100
          # 从上一步提取的 Workshop Item ID
          itemid: ${{ steps.workshop_id.outputs.workshop_id }}
          # 发布内容目录
          path: ${{ runner.temp }}/release-package/easyrim
        env:
          # 必需 Secrets
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
          # 可选：若账号开启手机令牌 2FA，建议配置 shared_secret
          STEAM_TFASEED: ${{ secrets.STEAM_TFASEED }}
